name: ÖNEL Servis Web Check

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
    paths:
      - 'mobile-app/**'
      - '.github/workflows/onel-servis-web-check.yml'
  pull_request:
    paths:
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    name: TypeScript & Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: onel-servis-dist
          path: mobile-app/dist
          if-no-files-found: warn
