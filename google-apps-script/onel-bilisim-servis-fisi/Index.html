<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<base target="_top">
<title>ÖNEL BİLİŞİM - Servis Fişi</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #eef2f7;
    color: #1e293b;
  }
  .container {
    max-width: 780px;
    margin: 24px auto;
    padding: 24px 28px 28px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,.08);
  }
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #1e3a8a;
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  .app-header h1 { margin: 0; font-size: 20px; color: #1e3a8a; }
  .app-header .muted { color: #64748b; font-size: 13px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 13px;
    color: #334155;
  }
  input, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    background: #fff;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus {
    border-color: #1e3a8a;
    box-shadow: 0 0 0 3px rgba(30,58,138,.15);
  }
  textarea { min-height: 90px; resize: vertical; }

  .buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    padding: 10px 20px;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  .btn-primary { background: #1e3a8a; color: #fff; }
  .btn-primary:hover { background: #172554; }
  .btn-secondary { background: #e2e8f0; color: #1e293b; }
  .btn-secondary:hover { background: #cbd5e1; }

  .toast {
    position: fixed; top: 18px; right: 18px;
    background: #16a34a; color: #fff;
    padding: 10px 14px; border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,.15);
    display: none;
  }

  /* =================== BASKI ALANI =================== */
  .print-area { display: none; }

  @media print {
    body { background: #fff; }
    .container, .toast { display: none !important; }
    .print-area { display: block; }
    @page { size: A4 landscape; margin: 0; }
  }

  .a4-sheet {
    width: 297mm;
    height: 210mm;
    display: flex;
    flex-direction: row;
    page-break-after: always;
  }
  .receipt {
    width: 148.5mm;
    height: 210mm;
    padding: 7mm 8mm;
    border-right: 1px dashed #94a3b8;
    position: relative;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #0f172a;
  }
  .receipt:last-child { border-right: 0; }

  .r-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid #1e3a8a;
    padding-bottom: 4mm;
  }
  .logo-wrap { display: flex; flex-direction: column; }
  .logo {
    font-weight: 900;
    font-size: 20pt;
    letter-spacing: .5px;
    color: #1e3a8a;
    font-style: italic;
  }
  .logo .mark {
    display: inline-block;
    background: #1e3a8a;
    color: #fff;
    padding: 1px 6px;
    border-radius: 3px;
    font-style: italic;
    margin-right: 2px;
  }
  .logo-sub {
    font-size: 9pt;
    color: #334155;
    margin-top: 1mm;
    font-style: normal;
  }
  .r-title {
    text-align: right;
  }
  .r-title .t1 {
    font-size: 10pt;
    font-weight: 700;
    color: #1e3a8a;
    letter-spacing: 1px;
  }
  .copy-label {
    display: inline-block;
    margin-top: 2mm;
    font-size: 9pt;
    font-weight: 700;
    color: #b91c1c;
    border: 1.5px solid #b91c1c;
    padding: 1px 6px;
    border-radius: 3px;
  }

  .r-row { display: flex; gap: 4mm; margin-top: 3mm; }
  .r-field { flex: 1; }
  .r-field .lbl {
    font-size: 8pt;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .r-field .val {
    font-size: 11pt;
    color: #0f172a;
    border-bottom: 1px solid #94a3b8;
    min-height: 6mm;
    padding: 1mm 0;
  }

  .r-box {
    margin-top: 3mm;
  }
  .r-box .lbl {
    font-size: 8pt;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 1mm;
  }
  .r-box .content {
    border: 1px solid #1e3a8a;
    border-radius: 2px;
    padding: 2mm 3mm;
    font-size: 10pt;
    color: #0f172a;
    white-space: pre-wrap;
    min-height: 30mm;
  }
  .r-box.small .content { min-height: 22mm; }

  .r-footer {
    position: absolute;
    bottom: 7mm;
    left: 8mm;
    right: 8mm;
  }
  .r-note {
    font-size: 8pt;
    color: #475569;
    line-height: 1.35;
    margin-bottom: 5mm;
    text-align: justify;
  }
  .sig-row {
    display: flex;
    justify-content: space-between;
    gap: 6mm;
  }
  .sig {
    flex: 1;
    text-align: center;
    font-size: 9pt;
    color: #334155;
  }
  .sig .line { border-top: 1px solid #0f172a; padding-top: 1mm; }
</style>
</head>
<body>

<div class="container">
  <div class="app-header">
    <div>
      <h1>ÖNEL BİLİŞİM — Servis Teslim Fişi</h1>
      <div class="muted">Formu doldurun, "Yazdır" butonu ile A4 kağıda iki nüsha alın.</div>
    </div>
  </div>

  <div class="form-grid">
    <div>
      <label>Müşteri / Firma Adı Soyadı</label>
      <input id="musteri" type="text" placeholder="Örn: Ahmet Yılmaz / ABC Ltd.">
    </div>
    <div>
      <label>Telefon</label>
      <input id="telefon" type="text" placeholder="05xx xxx xx xx">
    </div>
    <div>
      <label>Teslim Alış Tarihi</label>
      <input id="tarih" type="date">
    </div>
    <div>
      <label>Cihaz / Ürün</label>
      <input id="cihaz" type="text" placeholder="Örn: Canon IR2520 Fotokopi Makinesi">
    </div>
    <div class="full">
      <label>Müşteri Sorunu / Yapılacak İşler</label>
      <textarea id="sorun" placeholder="Müşterinin bildirdiği sorun veya istenen işlemler..."></textarea>
    </div>
    <div class="full">
      <label>Yapılan İş ve İşlemler</label>
      <textarea id="yapilanIs" placeholder="Servis sırasında yapılan işler, değişen parçalar..."></textarea>
    </div>
    <div>
      <label>Ücret (₺)</label>
      <input id="ucret" type="text" placeholder="0,00">
    </div>
    <div>
      <label>Teslim Alan Yetkili</label>
      <input id="yetkili" type="text" value="Furkan ÖNEL" placeholder="Yetkili adı soyadı">
    </div>
  </div>

  <div class="buttons">
    <button class="btn-primary" onclick="yazdir()">🖨️ Yazdır (A4 - 2 Nüsha)</button>
    <button class="btn-secondary" onclick="kaydetVeYazdir()">💾 Kaydet & Yazdır</button>
    <button class="btn-secondary" onclick="temizle()">Temizle</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="print-area" id="printArea"></div>

<script>
  // Bugünün tarihini varsayılan yap
  document.getElementById('tarih').valueAsDate = new Date();

  function val(id) {
    var el = document.getElementById(id);
    return el ? (el.value || '').trim() : '';
  }

  function formatTarih(d) {
    if (!d) return '';
    var p = d.split('-');
    if (p.length !== 3) return d;
    return p[2] + '.' + p[1] + '.' + p[0];
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function formuOku() {
    return {
      musteri: val('musteri'),
      telefon: val('telefon'),
      tarih: val('tarih'),
      cihaz: val('cihaz'),
      sorun: val('sorun'),
      yapilanIs: val('yapilanIs'),
      ucret: val('ucret'),
      yetkili: val('yetkili')
    };
  }

  function olusturNusha(etiket, veri) {
    return (
      '<div class="receipt">' +
        '<div class="r-header">' +
          '<div class="logo-wrap">' +
            '<div class="logo"><span class="mark">03</span>ÖNEL BİLİŞİM</div>' +
            '<div class="logo-sub">Furkan ÖNEL &nbsp;·&nbsp; 0537 846 03 77</div>' +
          '</div>' +
          '<div class="r-title">' +
            '<div class="t1">SERVİS FİŞİ</div>' +
            '<div class="copy-label">' + etiket + '</div>' +
          '</div>' +
        '</div>' +

        '<div class="r-row">' +
          '<div class="r-field"><div class="lbl">Müşteri / Firma</div><div class="val">' + escapeHtml(veri.musteri) + '</div></div>' +
          '<div class="r-field" style="max-width:42mm;"><div class="lbl">Telefon</div><div class="val">' + escapeHtml(veri.telefon) + '</div></div>' +
        '</div>' +

        '<div class="r-row">' +
          '<div class="r-field" style="max-width:35mm;"><div class="lbl">Tarih</div><div class="val">' + escapeHtml(formatTarih(veri.tarih)) + '</div></div>' +
          '<div class="r-field"><div class="lbl">Cihaz / Ürün</div><div class="val">' + escapeHtml(veri.cihaz) + '</div></div>' +
        '</div>' +

        '<div class="r-box">' +
          '<div class="lbl">Müşteri Sorunu / Yapılacak İşler</div>' +
          '<div class="content">' + escapeHtml(veri.sorun) + '</div>' +
        '</div>' +

        '<div class="r-box small">' +
          '<div class="lbl">Yapılan İş ve İşlemler</div>' +
          '<div class="content">' + escapeHtml(veri.yapilanIs) + '</div>' +
        '</div>' +

        '<div class="r-row" style="margin-top:3mm;">' +
          '<div class="r-field" style="max-width:45mm;"><div class="lbl">Ücret (₺)</div><div class="val">' + escapeHtml(veri.ucret) + '</div></div>' +
        '</div>' +

        '<div class="r-footer">' +
          '<div class="r-note">Yukarıda belirtilen cihaz/ürünü yukarıdaki şikayet ve işlemler doğrultusunda teslim ettim/aldım. ' +
          'Teslim sonrası oluşabilecek sorunlardan firma sorumlu değildir. Cihaz 30 gün içinde teslim alınmadığı takdirde doğacak sorumluluk müşteriye aittir.</div>' +
          '<div class="sig-row">' +
            '<div class="sig"><div class="line">Teslim Eden (Müşteri)</div></div>' +
            '<div class="sig"><div class="line">Teslim Alan<br>' + escapeHtml(veri.yetkili) + '</div></div>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function yazdir() {
    var veri = formuOku();
    if (!veri.musteri) {
      toast('Lütfen müşteri / firma adını giriniz.', true);
      return;
    }
    var html =
      '<div class="a4-sheet">' +
        olusturNusha('MÜŞTERİ NÜSHASI', veri) +
        olusturNusha('FİRMA NÜSHASI', veri) +
      '</div>';
    document.getElementById('printArea').innerHTML = html;
    setTimeout(function(){ window.print(); }, 150);
  }

  function kaydetVeYazdir() {
    var veri = formuOku();
    if (!veri.musteri) {
      toast('Lütfen müşteri / firma adını giriniz.', true);
      return;
    }
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.saved) toast('Kaydedildi. Yazdırılıyor...');
          else toast('Yazdırılıyor (kayıt kapalı).');
          yazdir();
        })
        .withFailureHandler(function (err) {
          toast('Kayıt hatası: ' + err.message, true);
          yazdir();
        })
        .kaydet(veri);
    } else {
      yazdir();
    }
  }

  function temizle() {
    ['musteri','telefon','cihaz','sorun','yapilanIs','ucret'].forEach(function (id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('tarih').valueAsDate = new Date();
    document.getElementById('musteri').focus();
  }

  function toast(msg, hata) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = hata ? '#dc2626' : '#16a34a';
    t.style.display = 'block';
    clearTimeout(t._h);
    t._h = setTimeout(function(){ t.style.display = 'none'; }, 2500);
  }
</script>
</body>
</html>
